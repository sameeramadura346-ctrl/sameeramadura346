<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Summarizer - Sameera Official</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="../sameera-style.css" rel="stylesheet">
    <style>
        .summarizer-container {
            max-width: 1200px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 94, 0, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: fade-in-up 0.8s ease-out;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .input-area,
        .output-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .area-label {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: #FF5E00;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            resize: none;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #FF5E00;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.2);
        }

        .output-console {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 178, 255, 0.3);
            border-radius: 12px;
            color: #00B2FF;
            padding: 20px;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            line-height: 1.6;
            overflow-y: auto;
            position: relative;
        }

        .scan-line {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 2px;
            background: #FF5E00;
            box-shadow: 0 0 15px #FF5E00;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .length-slider {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #FF5E00;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #FF5E00;
        }

        .action-btn {
            background: linear-gradient(45deg, #FF5E00, #00B2FF);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            font-family: 'Orbitron';
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.4);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.6);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #777;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.active {
            background: #FF5E00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .summarizer-container {
                margin: 80px 20px;
            }
        }
    </style>
</head>

<body id="top">
    <!-- Animated Grid Background -->
    <div class="grid-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="scanlines"></div>

    <!-- Animated Shapes -->
    <div class="shapes-container">
        <div class="shape shape-circle"></div>
        <div class="shape shape-triangle"></div>
        <div class="shape shape-square"></div>
    </div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html#home" class="logo-link">
                <svg class="logo-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#FF5E00;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00B2FF;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <polygon points="20,2 38,14 38,26 20,38 2,26 2,14" fill="none" stroke="url(#logoGradient)"
                        stroke-width="2" />
                    <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" fill="url(#logoGradient)"
                        font-family="Orbitron, sans-serif" font-weight="900" font-size="18">S</text>
                </svg>
                <span class="logo-text">SAMEERA</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="../prompt-hub.html" class="nav-link">Prompt Hub</a></li>
                <li><a href="../live-cricket.html" class="nav-link">Cricket WorldCup</a></li>
                <li><a href="../our-tools.html" class="nav-link active">Our Tools</a></li>
                <li><a href="../about-us.html" class="nav-link">About Us</a></li>
            </ul>
            <button class="music-toggle" id="musicToggle" title="Play Music">
                <svg class="play-icon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg class="stop-icon" viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="summarizer-container">
            <h1 class="section-title" style="margin-bottom: 20px;">SMART SUMMARIZER</h1>

            <div class="main-grid">
                <div class="input-area">
                    <div class="area-label">
                        <span>SOURCE TEXT</span>
                        <span id="word-count">0 WORDS</span>
                    </div>
                    <textarea id="text-input" placeholder="Paste your article or long text here..."></textarea>
                    <div class="scan-line" id="scan-line"></div>
                </div>

                <div class="output-area">
                    <div class="area-label">
                        <span>AI SUMMARY</span>
                        <span id="status-text"><span class="status-dot"></span>READY</span>
                    </div>
                    <div class="output-console" id="output-console">
                        Waiting for input...
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="length-slider">
                    <label style="font-family: 'Orbitron'; font-size: 0.8rem;">SUMMARY LENGTH:</label>
                    <input type="range" id="summary-length" min="1" max="3" value="2">
                    <span id="length-label" style="font-family: 'Orbitron'; color: #00B2FF; width: 80px;">MEDIUM</span>
                </div>
                <button class="action-btn" id="summarize-btn">GENERATE SUMMARY</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="../privacy-policy.html">Privacy Policy</a>
                <a href="../terms-of-service.html">Terms of Service</a>
                <a href="#careers">Careers</a>
            </div>
            <p class="copyright">© 2025 sameera official. All rights reserved.</p>
        </div>
    </footer>

    <script src="../sameera-scripts.js"></script>
    <script src="summarizer.js"></script>
</body>

</html>
