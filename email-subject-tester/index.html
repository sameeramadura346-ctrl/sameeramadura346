<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Subject Tester - Sameera Official</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="../sameera-style.css" rel="stylesheet">
    <style>
        .tester-container {
            max-width: 1200px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 178, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            animation: fade-in-up 0.8s ease-out;
        }

        .input-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .label-neon {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: #00B2FF;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
        }

        #email-topic {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            min-height: 120px;
            resize: none;
        }

        .variation-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .variation-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .variation-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 178, 255, 0.3);
            transform: translateX(10px);
        }

        .score-gauge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            font-weight: 900;
            border: 2px solid;
            flex-shrink: 0;
        }

        .score-low {
            border-color: #FF2E2E;
            color: #FF2E2E;
            text-shadow: 0 0 10px rgba(255, 46, 46, 0.3);
        }

        .score-mid {
            border-color: #FFD700;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .score-high {
            border-color: #39FF14;
            color: #39FF14;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        .subject-content {
            flex: 1;
        }

        .subject-text {
            color: #fff;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            margin-bottom: 5px;
            display: block;
        }

        .subject-tag {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .test-btn {
            background: linear-gradient(45deg, #00B2FF, #00FFB2);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-family: 'Orbitron';
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .test-btn:hover {
            box-shadow: 0 0 30px rgba(0, 178, 255, 0.4);
            transform: translateY(-3px);
        }

        .analysis-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            border-radius: 20px;
            z-index: 10;
        }

        .pulse-scanner {
            width: 80px;
            height: 2px;
            background: #00B2FF;
            box-shadow: 0 0 20px #00B2FF;
            animation: scanning 2s linear infinite;
        }

        @keyframes scanning {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(20px);
                opacity: 0;
            }
        }

        @media (max-width: 968px) {
            .tester-container {
                grid-template-columns: 1fr;
                margin: 80px 20px;
            }
        }
    </style>
</head>

<body id="top">
    <div class="grid-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="scanlines"></div>

    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html#home" class="logo-link">
                <svg class="logo-svg" viewBox="0 0 40 40">
                    <polygon points="20,2 38,14 38,26 20,38 2,26 2,14" fill="none" stroke="#00B2FF" stroke-width="2" />
                    <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" fill="#00B2FF"
                        font-family="Orbitron" font-weight="900" font-size="18">S</text>
                </svg>
                <span class="logo-text">SAMEERA</span>
            </a>
            <button class="music-toggle" id="musicToggle" title="Play Music">
                <svg class="play-icon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg class="stop-icon" viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
        </div>
    </nav>

    <main>
        <div class="tester-container">
            <div class="input-panel">
                <h1 class="section-title" style="font-size: 2.2rem; text-align: left; margin-bottom: 5px;">EMAIL SUBJECT
                    TESTER</h1>
                <p style="font-family: 'Rajdhani'; color: rgba(255,255,255,0.6); margin-bottom: 25px;">Predict and
                    optimize your email open rates with neural analysis.</p>

                <div class="input-group">
                    <label class="label-neon">EMAIL CONTENT / TOPIC</label>
                    <textarea id="email-topic"
                        placeholder="Briefly describe what your email is about (e.g. A limited time 50% discount on web hosting)..."></textarea>
                </div>

                <div class="input-group">
                    <label class="label-neon">TARGET AUDIENCE</label>
                    <input type="text" id="target-audience" placeholder="e.g. Freelance Developers"
                        style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; color: white; font-family: 'Rajdhani';">
                </div>

                <button class="test-btn" id="run-test">ANALYZE & GENERATE</button>
            </div>

            <div class="results-panel" style="position: relative;">
                <div class="analysis-overlay" id="loader">
                    <div class="pulse-scanner"></div>
                    <p style="font-family: 'Orbitron'; color: #00B2FF; font-size: 0.7rem; letter-spacing: 2px;">NEURAL
                        CALCULATION IN PROGRESS</p>
                </div>

                <label class="label-neon">NEURAL OPTIMIZED VARIATIONS</label>
                <div class="variation-list" id="v-list">
                    <p style="color: rgba(255,255,255,0.3); font-family: 'Rajdhani';">Neural variations will appear here
                        after analysis...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="email-tester.js"></script>
</body>

</html>
