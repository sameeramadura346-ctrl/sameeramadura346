<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Insight - Sameera Official</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="../sameera-style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        .pdf-container {
            max-width: 1400px;
            margin: 100px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            animation: fade-in-up 0.8s ease-out;
        }

        .viewer-main {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 178, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .hologram-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0, 178, 255, 0.05) 0%, transparent 50%, rgba(0, 178, 255, 0.05) 100%);
            pointer-events: none;
            z-index: 10;
        }

        #pdf-render-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            background: #222;
            border-radius: 10px;
        }

        canvas {
            max-width: 100%;
            box-shadow: 0 0 30px rgba(0, 178, 255, 0.2);
        }

        .viewer-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .insight-sidebar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 94, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .insight-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insight-label {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: #FF5E00;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .insight-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Rajdhani';
            font-size: 0.95rem;
            color: #fff;
            min-height: 100px;
        }

        .scan-animation {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #00B2FF;
            box-shadow: 0 0 15px #00B2FF;
            top: 0;
            z-index: 11;
            display: none;
        }

        .upload-btn {
            background: linear-gradient(45deg, #FF5E00, #00B2FF);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.5);
        }

        @media (max-width: 1100px) {
            .pdf-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body id="top">
    <div class="grid-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="scanlines"></div>

    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html#home" class="logo-link">
                <svg class="logo-svg" viewBox="0 0 40 40">
                    <polygon points="20,2 38,14 38,26 20,38 2,26 2,14" fill="none" stroke="#FF5E00" stroke-width="2" />
                    <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" fill="#FF5E00"
                        font-family="Orbitron" font-size="18">S</text>
                </svg>
                <span class="logo-text">SAMEERA</span>
            </a>
        </div>
    </nav>

    <main>
        <div class="pdf-container">
            <div class="viewer-main">
                <div class="hologram-effect"></div>
                <div class="scan-animation" id="scan-bar"></div>

                <div class="viewer-controls">
                    <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('pdf-upload').click()">UPLOAD
                        PDF</button>

                    <div style="font-family: 'Orbitron'; font-size: 0.8rem; color: #00B2FF;">
                        PAGE <span id="page-num">0</span> / <span id="page-count">0</span>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button class="upload-btn" style="background: rgba(255,255,255,0.1);"
                            id="prev-page">PREV</button>
                        <button class="upload-btn" style="background: rgba(255,255,255,0.1);"
                            id="next-page">NEXT</button>
                    </div>
                </div>

                <div id="pdf-render-container">
                    <canvas id="pdf-canvas"></canvas>
                </div>
            </div>

            <div class="insight-sidebar">
                <div class="insight-section">
                    <label class="insight-label">SYSTEM STATUS</label>
                    <div class="insight-box" id="status-box" style="color: #00FFB2;">READY TO ANALYZE</div>
                </div>

                <div class="insight-section">
                    <label class="insight-label">NEURAL SUMMARY</label>
                    <div class="insight-box" id="summary-box">Waiting for document...</div>
                </div>

                <div class="insight-section">
                    <label class="insight-label">KEY ENTITIES</label>
                    <div class="insight-box" id="entities-box">No data detected.</div>
                </div>

                <button class="action-btn" id="analyze-btn" style="margin-top: auto;">RE-SCAN DOCUMENT</button>
            </div>
        </div>
    </main>

    <script src="../sameera-scripts.js"></script>
    <script src="pdf-insight.js"></script>
</body>

</html>
